name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Compile Python files
        run: |
          python -m py_compile main.py streamlit_app.py modules/*.py modules/reports/*.py modules/importers/*.py modules/ui/*.py scripts/*.py tests/*.py

      - name: Run tests
        run: |
          python -m pytest -q
